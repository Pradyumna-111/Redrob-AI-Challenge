ai_usage_summary: |
  Used Codex/ChatGPT to inspect the challenge files, design an offline deterministic
  ranking approach, implement the Python ranker, generate explainable reasoning,
  and validate the submission format. No candidate data is sent to hosted LLM APIs
  during ranking, and the submitted ranking step uses no network access.

methodology_summary: |
  Offline deterministic ranker for the Senior AI Engineer JD. The model combines
  title fit, production retrieval/ranking evidence, AI/search skill quality,
  product-company domain fit, experience-band fit, Redrob behavioral availability
  signals, location fit, and trap penalties. It avoids keyword stuffing by requiring
  career-history evidence and down-weighting non-technical or inactive profiles with
  superficial AI keywords. The ranking step uses only the Python standard library,
  no network, no GPU, and completes within the challenge budget.

